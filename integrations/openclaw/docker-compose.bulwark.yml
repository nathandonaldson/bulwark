# Bulwark Shield sidecar for OpenClaw
# Usage: docker compose -f docker-compose.yml -f docker-compose.bulwark.yml up
#
# Runs Bulwark alongside OpenClaw on port 8100. The agent can reach it
# at http://localhost:8100 from within the container.

services:
  bulwark:
    image: ghcr.io/nathandonaldson/bulwark:latest
    network_mode: "service:openclaw-gateway"
    environment:
      - BULWARK_DASHBOARD_PORT=8100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
