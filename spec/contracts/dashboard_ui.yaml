feature: Dashboard UI — shell + Shield + Events + Configure + Leak Detection + Test
version: "2.0.0"
module: bulwark.dashboard.static.src

# v2.0.0 (ADR-031): LLM backend is gone. No analyze/execute UI, no /v1/llm/*
# API, no Test-connection button. Pipeline is sanitize → DeBERTa → wrap.
# Canaries move from the Configure page to their own Leak Detection page.

guarantees:
  # --- Status pill (top nav) ---
  - id: G-UI-STATUS-001
    summary: >
      computeStatusPill returns {kind:'ok', label:'All layers active'} when every
      user-controllable layer in layerConfig is true AND detector.status === 'ready'.
  - id: G-UI-STATUS-002
    summary: >
      computeStatusPill returns {kind:'warn', label:'{active} of {total} layers active'}
      when one or more user-controllable defense layers are off.
  - id: G-UI-STATUS-003
    summary: >
      computeStatusPill returns {kind:'bad', label:'Detector unreachable'} when
      detector.status === 'error'.
  - id: G-UI-STATUS-004
    summary: >
      computeStatusPill returns {kind:'warn', label:'Loading detector…'} when
      detector.status === 'loading' (DeBERTa weights downloading).
  - id: G-UI-STATUS-005
    summary: >
      The Brand component renders "v{version}" from store.version (sourced from
      GET /healthz .version). No hardcoded version string remains in shell.jsx.
  - id: G-UI-STATUS-007
    summary: >
      The rendered StatusPill element carries role="status" and aria-live="polite"
      so state changes are announced by assistive tech.

  # --- Reduced motion ---
  - id: G-UI-A11Y-001
    summary: >
      index.html includes a @media (prefers-reduced-motion: reduce) block that
      caps animation-duration and transition-duration to 0.01ms.
  - id: G-UI-A11Y-002
    summary: >
      Buttons use button:focus-visible { outline: 2px solid var(--accent);
      outline-offset: 2px } for keyboard focus.

  # --- Shield page ---
  - id: G-UI-INCIDENT-001
    summary: >
      hasRecentIncident(events, nowMs) returns true iff any event has
      verdict === 'blocked' AND ts > nowMs - 30 * 60 * 1000.
  - id: G-UI-INCIDENT-002
    summary: >
      hasRecentIncident returns false when every blocked event is older than
      30 minutes (banner auto-dismisses).
  - id: G-UI-INCIDENT-003
    summary: >
      The incident banner element carries role="alert" so assistive tech
      announces new attacks.
  - id: G-UI-TOKENS-001
    summary: >
      RadialShield ring strokes use CSS custom properties only
      (var(--stage-*)) — no inline hex colors remain in page-shield.jsx.
  - id: G-UI-TOKENS-STAGES-001
    summary: >
      index.html :root defines --stage-sanitizer, --stage-detection,
      --stage-boundary, --stage-canary custom properties.
  - id: G-UI-SHIELD-001
    summary: >
      PageShield renders exactly one Shield variant (ShieldRadial). No branching
      on a layout prop; no ShieldData or ShieldHybrid functions remain.
  - id: G-UI-SHIELD-002
    summary: >
      The four stat tiles on the Shield page read processed / blocked / canary /
      modified from store.stats24h (fed by /api/metrics via data.jsx).
  - id: G-UI-SHIELD-003
    summary: >
      Layer rows render every entry in LAYERS unconditionally; disabled layers
      remain visible with reduced opacity.

  # --- Events page ---
  - id: G-UI-EMPTY-001
    summary: >
      When store.events is empty AND no filter is active, EventsEmptyState
      renders data-empty-state="no-events" with a "Run a test" primary action.
  - id: G-UI-EMPTY-002
    summary: >
      When filtered results are empty AND at least one filter/layer/search is
      active, EventsEmptyState renders data-empty-state="filter-miss" with a
      "Clear filters" secondary action.
  - id: G-UI-EMPTY-003
    summary: >
      Clicking "Clear filters" resets filter to 'all', layerFilter to 'all',
      and search to ''.
  - id: G-UI-EMPTY-004
    summary: >
      isAnyFilterActive(filter, layerFilter, search) returns true iff any of
      those values deviate from its default ('all', 'all', '' respectively).
  - id: G-UI-FILTER-001
    summary: >
      filterEvents(events, {filter, layerFilter, search}) narrows by verdict
      exactly, by layer exactly, and by case-insensitive substring match on
      detail || source.
  - id: G-UI-EXPAND-001
    summary: >
      When event.verdict === 'modified' and event.metadata carries both `before`
      and `after` fields, EventExpansion renders two <pre> diff panes.
  - id: G-UI-EXPAND-002
    summary: >
      When event.verdict === 'blocked', EventExpansion renders a "Replay in Test"
      button that dispatches a bulwark:goto CustomEvent targeting the Test page.
  - id: G-UI-EXPAND-003
    summary: >
      When event.metadata has no trace, _defaultTrace falls back to the first
      LAYERS so the trace pane is never empty.

  # --- Configure page (v2 layout) ---
  - id: G-UI-TOKENS-002
    summary: >
      STAGES in page-configure.jsx reference CSS custom properties
      (var(--stage-*)) — no inline hex colors remain.
  - id: G-UI-CONFIG-LAYOUT-001
    summary: >
      The Configure page shows three sections in order: (1) Pipeline layers
      (sanitizer, trust boundary toggles), (2) DeBERTa detector (status +
      confidence threshold), (3) PromptGuard second opinion (opt-in card).
      Canary management is NOT on this page — it lives on the Leak Detection
      page.
  - id: G-UI-CONFIG-DEBERTA-001
    summary: >
      DeBERTa detector card shows one of three states: "Loading weights…"
      (first-run download in progress), "Ready" (weights cached, model loaded,
      with latency + version info), or "Error: {message}" (download or load
      failed).
  - id: G-UI-CONFIG-PROMPTGUARD-001
    summary: >
      PromptGuard opt-in card renders with a clear "Optional — second opinion
      detector" label, describes the HuggingFace-approval requirement, and
      exposes a single toggle. When enabled, a HF token input appears;
      weights download on first /v1/clean call.
  - id: G-UI-CONFIG-PATTERNS-001
    summary: >
      Guard-pattern list renders from store.guardPatterns. Empty-state message
      directs users to bulwark-config.yaml.

  # --- Leak Detection page (new in v2) ---
  - id: G-UI-LEAK-LAYOUT-001
    summary: >
      The Leak Detection page (route data-page="leak-detection") renders two
      sections: (1) a header explaining canaries are for output-side detection
      via /v1/guard on the caller's own LLM output, and (2) the CanaryPane
      management UI.
  - id: G-UI-LEAK-CANARIES-001
    summary: >
      CanaryPane renders one card per entry in store.canaryTokens plus an
      inline Add form (label + shape selector + optional custom token).
      Entries are removable via a button on each card. Additions POST
      /api/canaries and refresh the store.

  # --- Test page ---
  - id: G-UI-PRESETS-001
    summary: >
      The Test page payload library renders presets from store.presets (fetched
      from GET /api/presets on load).
  - id: G-UI-TEST-RUN-001
    summary: >
      runPipeline calls BulwarkStore.runClean(payload) which POSTs /v1/clean
      with {content, source}. The returned trace is rendered as-is.
  - id: G-UI-TEST-RUN-002
    summary: >
      The trace pane's status is 'blocked' iff the backend returns HTTP 422,
      'error' iff the fetch raised, and 'passed' otherwise.
  - id: G-UI-TEST-REPLAY-001
    summary: >
      When the Events page dispatches a bulwark:goto CustomEvent whose detail
      carries a non-empty string payload, PageTest preloads that payload into
      the editor textarea.
  - id: G-UI-TEST-TIERS-001
    summary: >
      RedTeam renders tiers from store.redteamTiers.tiers (fetched via
      BulwarkStore.fetchRedteamTiers() → GET /api/redteam/tiers).
  - id: G-UI-TEST-TIERS-002
    summary: >
      When garak is not installed, the RedTeam card shows a disabled state and
      the Run button is disabled.
  - id: G-UI-TEST-REPORTS-001
    summary: >
      ReportsList reads from store.redteamReports (GET /api/redteam/reports)
      and shows an empty-state when none exist.
  - id: G-UI-TEST-REPORTS-002
    summary: >
      ReportRow Retest button calls BulwarkStore.retestReport(filename) which
      POSTs /api/redteam/retest with {filename}.
  - id: G-UI-TEST-REPORTS-003
    summary: >
      ReportRow caps the displayed defense-rate score at 99.99 % when the
      report has any hijacked probes (hijacked > 0).
  - id: G-UI-TEST-REPORTS-004
    summary: >
      After a red-team run completes, RedTeam auto-refetches /api/redteam/reports.
  - id: G-UI-TOKENS-003
    summary: >
      All JSX files under static/src reference CSS custom properties only —
      no inline hex color literals remain.

non_guarantees:
  - id: NG-UI-SHELL-001
    summary: Does NOT implement the ⌘K command palette
    reason: The search icon in the header is a stub. Full search modal deferred.
  - id: NG-UI-SHELL-002
    summary: Does NOT render a sidebar navigation
    reason: Removed before production per ADR-020.
  - id: NG-UI-SHIELD-001
    summary: Does NOT offer alternate Shield layouts (data-heavy, hybrid)
    reason: Variants pruned per ADR-020. Users get one opinionated shield view.
  - id: NG-UI-EVENTS-001
    summary: Does NOT persist filter state across reloads
    reason: Filters are React state only. Per-user saved filters deferred.
  - id: NG-UI-EVENTS-002
    summary: Does NOT show more than 120 rows at once
    reason: Table slices filtered events to the first 120 for rendering cost.
  - id: NG-UI-CONFIG-001
    summary: Does NOT let users edit guard patterns inline
    reason: Guard patterns read from bulwark-config.yaml. Inline editing has obvious
      footguns; config file edits + restart are the supported path.
  - id: NG-UI-CONFIG-002
    summary: Does NOT display live hit counts on guard patterns
    reason: Per-pattern metrics aren't aggregated yet. Better to show nothing than fake it.
  - id: NG-UI-CONFIG-003
    summary: Does NOT expose any LLM backend configuration
    reason: v2.0.0 (ADR-031) — Bulwark never calls an LLM. The caller owns the LLM;
      there is nothing for the dashboard to configure.
  - id: NG-UI-TEST-001
    summary: Does NOT animate or fake per-step reveal timing on the trace pane
    reason: The backend returns the complete trace in one response; we render it directly.
  - id: NG-UI-TEST-002
    summary: Does NOT show a cURL snippet for the current payload
    reason: >
      Removed in v2.3.0 — unwired buttons mislead users. If/when this
      ships it'll be wired. The Test page exposes Run + Clear only.
