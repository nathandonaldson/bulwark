feature: Environment variable configuration
version: "2.0.0"

# v2.0.0 (ADR-031): LLM backend env vars removed — Bulwark no longer calls
# an LLM. G-ENV-001..005 + G-ENV-012..013 dropped. Remaining env vars cover
# auth token, allowlists, and dotenv autoload.

guarantees:
  - id: G-ENV-006
    summary: Config env vars take effect without any config file present
  - id: G-ENV-009
    summary: BULWARK_ALLOWED_HOSTS env var (comma-separated) adds hostnames to the SSRF allowlist
    rationale: Opt-in widening of the SSRF block for webhook URLs. See ADR-015.
  - id: G-ENV-010
    summary: Dashboard auto-loads a .env file from cwd at startup, without overriding existing env vars
    rationale: Eliminates the silent failure mode where local-source users edit .env, restart, and hit 401 because Python didn't read the file. Docker path unaffected — --env-file continues to populate os.environ. See ADR-016.
  - id: G-ENV-011
    summary: BULWARK_* env vars override corresponding fields loaded from the saved config file
    rationale: Env vars are the persistent source of truth. Dashboard UI edits are session-level; next load, env wins.
  - id: G-ENV-014
    summary: BULWARK_API_TOKEN env var enables Bearer auth on mutating + LLM-exposed endpoints
  - id: G-ENV-015
    summary: BULWARK_WEBHOOK_URL env var sets the external webhook URL, shadowing config

non_guarantees:
  - id: NG-ENV-001
    summary: Dashboard UI changes do NOT persist across container restarts
    reason: Env vars are the persistent config mechanism in Docker. Dashboard changes are in-memory only.
  - id: NG-ENV-LLM-REMOVED
    summary: BULWARK_LLM_MODE / BULWARK_API_KEY / BULWARK_BASE_URL / BULWARK_ANALYZE_MODEL / BULWARK_EXECUTE_MODEL are REMOVED in v2.0.0
    reason: ADR-031 — Bulwark never calls an LLM. These env vars had no remaining function.
