feature: Environment variable configuration
version: "0.5.0"

guarantees:
  - id: G-ENV-001
    summary: BULWARK_LLM_MODE env var sets the LLM backend mode on startup
  - id: G-ENV-002
    summary: BULWARK_API_KEY env var sets the Anthropic API key on startup
  - id: G-ENV-003
    summary: BULWARK_BASE_URL env var sets the OpenAI-compatible base URL on startup
  - id: G-ENV-004
    summary: BULWARK_ANALYZE_MODEL env var sets the Phase 1 model on startup
  - id: G-ENV-005
    summary: BULWARK_EXECUTE_MODEL env var sets the Phase 2 model on startup
  - id: G-ENV-006
    summary: Env vars take effect without any config file present
  - id: G-ENV-007
    summary: Dashboard UI reflects env var values on load
  - id: G-ENV-008
    summary: Dashboard UI changes override env vars for the current session
  - id: G-ENV-009
    summary: BULWARK_ALLOWED_HOSTS env var (comma-separated) adds hostnames to the SSRF allowlist
    rationale: Opt-in widening of the SSRF block for LAN inference servers. See ADR-015.
  - id: G-ENV-010
    summary: Dashboard auto-loads a .env file from cwd at startup, without overriding existing env vars
    rationale: Eliminates the silent failure mode where local-source users edit .env, restart, and hit 401 because Python didn't read the file. Docker path unaffected — --env-file continues to populate os.environ. See ADR-016.
  - id: G-ENV-011
    summary: BULWARK_* env vars override corresponding fields loaded from the saved config file
    rationale: Docker .env and shell env are the persistent source of truth for credentials. Dashboard UI edits are session-level; next load, env wins. Prior NG-ENV-002 documented the opposite and was wrong.

non_guarantees:
  - id: NG-ENV-001
    summary: Dashboard UI changes do NOT persist across container restarts
    reason: Env vars are the persistent config mechanism in Docker. Dashboard changes are in-memory only.
