function: bulwark.clean
module: bulwark.shortcuts
version: "0.3.0"

guarantees:
  - id: G-CLEAN-001
    summary: Returns a string
  - id: G-CLEAN-002
    summary: Zero-width Unicode characters (U+200B, U+200C, U+200D, U+FEFF) are removed
  - id: G-CLEAN-003
    summary: HTML script/style tags and content are removed
  - id: G-CLEAN-004
    summary: Output is wrapped in trust boundary tags
  - id: G-CLEAN-005
    summary: Source parameter appears in boundary tag name
  - id: G-CLEAN-006
    summary: Security instruction text is included in boundary
  - id: G-CLEAN-007
    summary: Content is NOT truncated when max_length is None (default)
  - id: G-CLEAN-008
    summary: Content IS truncated when explicit max_length is provided
  - id: G-CLEAN-009
    summary: format="markdown" produces markdown fence boundaries (no XML tags)
  - id: G-CLEAN-010
    summary: format="delimiter" produces delimiter boundaries (no XML tags)
  - id: G-CLEAN-011
    summary: TypeError raised for non-string content
  - id: G-CLEAN-012
    summary: ValueError raised for invalid format parameter
  - id: G-CLEAN-013
    summary: Empty string input produces trust boundary with empty content
  - id: G-CLEAN-DETECTOR-REQUIRED-001
    summary: >
      When the dashboard has zero ML detectors loaded AND the LLM judge is
      disabled, /v1/clean MUST refuse to serve sanitize-only output. The
      sanitizer-only path is never silently served. Operators who knowingly
      want sanitize-only traffic explicitly opt in via
      BULWARK_ALLOW_NO_DETECTORS=1 (see NG-CLEAN-DETECTOR-REQUIRED-001).
      The predicate matches /healthz's `degraded` definition (ADR-038) so
      both endpoints agree on what "detection chain present" means.
      See ADR-040.
  - id: G-PIPELINE-PARITY-001
    summary: >
      A library `Pipeline.from_config(path)` constructed from the same
      bulwark-config.yaml the dashboard uses MUST raise (or surface as
      `PipelineResult.blocked`) for any input the dashboard's /v1/clean
      blocks with HTTP 422. The library Pipeline reads
      `integrations.protectai.enabled`, `integrations.promptguard.enabled`,
      and `judge_backend.enabled` from the same config the dashboard reads,
      composes a detector chain mirroring the dashboard's
      `_detection_checks` + judge wire-up, and propagates
      `SuspiciousPatternError` from any detector that flags. ADR-044 closes
      the prior parity gap where the library got sanitizer + trust boundary
      only — strictly weaker than the dashboard reading the same file.
      Observability surface (/healthz, /api/integrations, EventDB) stays
      dashboard-only; this guarantee is about defense parity, not
      visibility parity.
  - id: G-DETECTOR-WINDOW-EVASION-001
    summary: >
      The detector chain MUST block the curated short-range split-evasion
      corpus (see src/bulwark/attacks.py
      AttackSuite.generate_split_evasion_samples) where the trigger and the
      malicious instruction are separated by no more than 32 tokens of
      benign filler. Within that range both fragments fit inside at least
      one chunk window (510-token window minus 64-token overlap leaves
      ~446 tokens of "sole" coverage with a 64-token shared region) and
      the chunked classifier MUST flag at least one window as INJECTION
      above threshold. This guarantee binds the per-window mechanic
      ADR-032 actually delivers — it does NOT promise coverage of the
      longer-separation regime that NG-DETECTOR-WINDOW-EVASION-001 carves
      out. ADR-046.
  - id: G-CLEAN-DECODE-ROT13-001
    summary: >
      /v1/clean MUST attempt ROT13 decoding on every request and run the
      configured detector chain on the rotated text. If any detector raises
      SuspiciousPatternError on the rotated variant, the request is blocked
      with HTTP 422. Always on; not gated by configuration. The trust
      boundary wraps the original cleaned text — the decoded variant exists
      only for detection. See ADR-047. Implementation delegates to
      bulwark.detector_chain.run_detector_chain, the unified helper
      introduced by ADR-048.
    related: [ADR-047, ADR-031, ADR-048]
    test_path: tests/test_decoders.py, tests/test_clean_decode.py
  - id: G-CLEAN-DECODE-BASE64-001
    summary: >
      When config.decode_base64 is True, /v1/clean MUST scan the cleaned
      text for base64-shaped substrings using regex
      [A-Za-z0-9+/_-]{20,}={0,2} (matching standard and url-safe
      alphabets), decode each candidate, and run the configured detector
      chain on each decoded variant that passes the quality gate
      (>=80% printable ASCII, >=10 decoded bytes). Up to depth-2 nested
      decoding. Per-request candidate cap of 16. If any detector raises
      on any variant, the request is blocked with HTTP 422. The trust
      boundary still wraps the original cleaned text — decoded variants
      never appear in the response body. See ADR-047. Implementation
      delegates to bulwark.detector_chain.run_detector_chain, the unified
      helper introduced by ADR-048.
    related: [ADR-047, ADR-048]
    test_path: tests/test_decoders.py, tests/test_clean_decode.py
  - id: G-CLEAN-DETECTOR-CHAIN-PARITY-001
    summary: >
      The library Pipeline.run() and the dashboard /v1/clean route MUST
      produce the same block decision for the same input. They MUST
      delegate detection to a single shared module
      (bulwark.detector_chain). This is the implementation guarantee
      that backs G-PIPELINE-PARITY-001: a single helper invocation, not
      two duplicated loops, ensures identical INJECTION / ERROR /
      UNPARSEABLE handling across both call sites. Future drift is
      mechanically harder because there is one place to change. See
      ADR-048.
    related: [ADR-048, ADR-044]
    test_path: tests/test_detector_chain.py, tests/test_clean_decode.py
  - id: G-CLEAN-DECODE-JUDGE-ALL-VARIANTS-001
    summary: >
      When the LLM judge is enabled, the judge MUST run on EVERY
      non-skipped decoded variant (original, rot13, base64@... when
      enabled, depth-2 combinations) before /v1/clean returns 200.
      Judge ERROR or UNPARSEABLE on a single variant in fail-open mode
      (judge_backend.fail_open=True) MUST be logged and recorded in the
      trace but MUST NOT short-circuit the chain — remaining variants
      are still scanned by the judge. The chain blocks on the first
      INJECTION verdict on any variant from any detector or judge, or
      on the first ERROR / UNPARSEABLE verdict when
      judge_backend.fail_open=False. Closes the H.2 defense gap where an
      attacker could engineer the original variant to make the judge
      choke and hide the real injection in an encoded variant. See
      ADR-048.
    related: [ADR-048, ADR-047, ADR-033]
    test_path: tests/test_detector_chain.py, tests/test_clean_decode.py

non_guarantees:
  - id: NG-CLEAN-001
    summary: Does NOT detect semantic prompt injection
    reason: clean() sanitizes and tags, it does not analyze content semantically. Use guard() or Pipeline.
  - id: NG-CLEAN-002
    summary: Does NOT decode base64, hex, or other encodings in content
    reason: Content is sanitized as-is. Encoding detection is a separate concern.
  - id: NG-CLEAN-003
    summary: LLM compliance with trust boundary tags is NOT guaranteed
    reason: Depends on LLM training. XML works well for Claude, other models vary.
  - id: NG-CLEAN-004
    summary: Calling clean() twice will double-wrap (NOT idempotent)
    reason: By design. Content is always wrapped, even if already wrapped.
  - id: NG-CLEAN-DETECTOR-REQUIRED-001
    summary: >
      Operators MAY explicitly opt into a sanitizer-only mode by setting
      BULWARK_ALLOW_NO_DETECTORS=1. In this mode /v1/clean serves the pre-
      v2.4.2 path: sanitize → trust-boundary wrap, no ML detection. The
      response body gains "mode": "degraded-explicit" so callers can detect
      the reduced-defense state. Each opt-in request emits a WARNING log
      via bulwark.dashboard.api_v1. Truthy values for the env var:
      "1" / "true" / "yes" (case-insensitive); "0" / "false" / "" do NOT
      opt in.
    reason: >
      Some legitimate workflows (corpus sanitization, dev/integration test
      rigs) deliberately want trust-boundary tagging without ML detection.
      The opt-in is loud (env var + per-request WARNING) so the operator
      can't accidentally end up here.
  - id: NG-DETECTOR-WINDOW-EVASION-001
    summary: >
      The per-window classifier does NOT reliably block split-evasion
      attacks where the trigger and the malicious instruction are
      separated by ≥ ~50 tokens of benign filler. Empirically (ADR-046
      §"Empirical investigation"), the gap is not a chunking artefact:
      even an unbounded single-window classifier loses the signal once
      enough benign English context surrounds the malicious fragments,
      because the model itself was not trained to find "needle in
      benign-haystack" patterns. Increasing chunk overlap, sliding
      mid-window re-classification, and aggregating per-window scores
      were all evaluated and rejected — none catch a separation larger
      than the model's window. Defense in this regime relies on the LLM
      Judge layer (ADR-033) reading the full prompt with cross-attention
      and on future content-fingerprinting work (planned ADR-047).
      Curated samples in src/bulwark/attacks.py
      AttackSuite.generate_split_evasion_samples are pinned as
      regression-prevention: if a model bump starts catching them,
      tests/test_split_evasion.py::TestSplitEvasionLongRange will flip
      and force us to revisit this non-guarantee.
    reason: >
      Per-window ML classifiers cannot synthesize signal that no single
      window emits. Pretending otherwise via fragile head+tail tricks
      would catch the easy curated cases while missing harder ones —
      security theatre worse than honest documentation.
  - id: NG-CLEAN-DECODE-NESTED-001
    summary: >
      Encoding nesting beyond depth 2 is NOT guaranteed to be detected.
      Two-pass decoding covers base64(rot13(...)) and rot13(base64(...));
      anything deeper (e.g. base64(base64(rot13(...)))) is intentionally
      bounded to prevent unbounded fan-out and adversarial DoS. Operators
      relying on defense against deeply-nested encodings should enable
      the LLM Judge (ADR-033), which sees the original text and can
      recognise nested encoding patterns. ADR-047.
    related: [ADR-047]
  - id: NG-CLEAN-DECODE-BASE64-FP-001
    summary: >
      When config.decode_base64 is True, requests containing legitimate
      base64 substrings (data URIs for images, OAuth tokens, JWT
      signatures, content hashes) MAY produce false positives. The
      printable-ASCII quality gate (>=80%, >=10 bytes) mitigates but does
      not eliminate this risk. Operators in email or attachment-heavy use
      cases should keep decode_base64=False (the default) and rely on the
      LLM Judge for encoded-injection coverage. ADR-047.
    related: [ADR-047]
  - id: NG-CLEAN-DECODE-VARIANTS-PRESERVED-001
    summary: >
      Decoded variants are NEVER returned in /v1/clean response bodies.
      The trust boundary wraps the original cleaned text exactly; the
      detector trace records variant labels (e.g. "base64@45:81") and
      skip reasons but does NOT include decoded content. This preserves
      the trust-boundary verbatim guarantee — a legitimate base64 string
      (image data, JWT) round-trips unchanged through /v1/clean even when
      decode_base64 is True. ADR-047.
    related: [ADR-047]
  - id: NG-CLEAN-DECODE-JUDGE-COST-001
    summary: >
      When judge_backend.enabled=True AND judge_backend.fail_open=True,
      /v1/clean now incurs N judge round-trips per request, where N is
      the number of non-skipped decoded variants (typically 1–~20,
      bounded by the candidate cap of 16 plus original + rot13). This
      is the operational cost of G-CLEAN-DECODE-JUDGE-ALL-VARIANTS-001
      / ADR-048: the judge runs on EVERY variant so an attacker can't
      hide an injection in an encoded variant by engineering the
      original to make the judge choke. For metered judge endpoints
      (per-token-priced backends like OpenAI / Anthropic), this is
      real money. Operators should monitor judge call volume and,
      if the increase is unacceptable, keep decode_base64=False (the
      default) to bound N to ~2 (original + rot13) — or set
      fail_open=False to revert to short-circuit-on-error semantics
      (with the trade-off that legitimate traffic blocks when the
      judge is transiently down). See ADR-048 §"Negative — judge
      cost when fail_open=True".
    reason: >
      Closing the H.2 defense gap (judge bypass via engineered original
      variant) requires running the judge on every variant. Bounding
      cost by short-circuiting on the first ERROR re-opens the gap.
      The honest disclosure is that fail-open mode now costs N judge
      calls per request; operators on metered endpoints can opt for
      fail-closed or limit decode fan-out to control the bill.
    related: [ADR-048]
