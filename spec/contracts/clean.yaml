function: bulwark.clean
module: bulwark.shortcuts
version: "0.3.0"

guarantees:
  - id: G-CLEAN-001
    summary: Returns a string
  - id: G-CLEAN-002
    summary: Zero-width Unicode characters (U+200B, U+200C, U+200D, U+FEFF) are removed
  - id: G-CLEAN-003
    summary: HTML script/style tags and content are removed
  - id: G-CLEAN-004
    summary: Output is wrapped in trust boundary tags
  - id: G-CLEAN-005
    summary: Source parameter appears in boundary tag name
  - id: G-CLEAN-006
    summary: Security instruction text is included in boundary
  - id: G-CLEAN-007
    summary: Content is NOT truncated when max_length is None (default)
  - id: G-CLEAN-008
    summary: Content IS truncated when explicit max_length is provided
  - id: G-CLEAN-009
    summary: format="markdown" produces markdown fence boundaries (no XML tags)
  - id: G-CLEAN-010
    summary: format="delimiter" produces delimiter boundaries (no XML tags)
  - id: G-CLEAN-011
    summary: TypeError raised for non-string content
  - id: G-CLEAN-012
    summary: ValueError raised for invalid format parameter
  - id: G-CLEAN-013
    summary: Empty string input produces trust boundary with empty content
  - id: G-CLEAN-DETECTOR-REQUIRED-001
    summary: >
      When the dashboard has zero ML detectors loaded AND the LLM judge is
      disabled, /v1/clean MUST refuse to serve sanitize-only output. The
      sanitizer-only path is never silently served. Operators who knowingly
      want sanitize-only traffic explicitly opt in via
      BULWARK_ALLOW_NO_DETECTORS=1 (see NG-CLEAN-DETECTOR-REQUIRED-001).
      The predicate matches /healthz's `degraded` definition (ADR-038) so
      both endpoints agree on what "detection chain present" means.
      See ADR-040.
  - id: G-PIPELINE-PARITY-001
    summary: >
      A library `Pipeline.from_config(path)` constructed from the same
      bulwark-config.yaml the dashboard uses MUST raise (or surface as
      `PipelineResult.blocked`) for any input the dashboard's /v1/clean
      blocks with HTTP 422. The library Pipeline reads
      `integrations.protectai.enabled`, `integrations.promptguard.enabled`,
      and `judge_backend.enabled` from the same config the dashboard reads,
      composes a detector chain mirroring the dashboard's
      `_detection_checks` + judge wire-up, and propagates
      `SuspiciousPatternError` from any detector that flags. ADR-044 closes
      the prior parity gap where the library got sanitizer + trust boundary
      only — strictly weaker than the dashboard reading the same file.
      Observability surface (/healthz, /api/integrations, EventDB) stays
      dashboard-only; this guarantee is about defense parity, not
      visibility parity.

non_guarantees:
  - id: NG-CLEAN-001
    summary: Does NOT detect semantic prompt injection
    reason: clean() sanitizes and tags, it does not analyze content semantically. Use guard() or Pipeline.
  - id: NG-CLEAN-002
    summary: Does NOT decode base64, hex, or other encodings in content
    reason: Content is sanitized as-is. Encoding detection is a separate concern.
  - id: NG-CLEAN-003
    summary: LLM compliance with trust boundary tags is NOT guaranteed
    reason: Depends on LLM training. XML works well for Claude, other models vary.
  - id: NG-CLEAN-004
    summary: Calling clean() twice will double-wrap (NOT idempotent)
    reason: By design. Content is always wrapped, even if already wrapped.
  - id: NG-CLEAN-DETECTOR-REQUIRED-001
    summary: >
      Operators MAY explicitly opt into a sanitizer-only mode by setting
      BULWARK_ALLOW_NO_DETECTORS=1. In this mode /v1/clean serves the pre-
      v2.4.2 path: sanitize → trust-boundary wrap, no ML detection. The
      response body gains "mode": "degraded-explicit" so callers can detect
      the reduced-defense state. Each opt-in request emits a WARNING log
      via bulwark.dashboard.api_v1. Truthy values for the env var:
      "1" / "true" / "yes" (case-insensitive); "0" / "false" / "" do NOT
      opt in.
    reason: >
      Some legitimate workflows (corpus sanitization, dev/integration test
      rigs) deliberately want trust-boundary tagging without ML detection.
      The opt-in is loud (env var + per-request WARNING) so the operator
      can't accidentally end up here.
