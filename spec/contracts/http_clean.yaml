endpoint: POST /v1/clean
version: "2.0.0"

guarantees:
  - id: G-HTTP-CLEAN-001
    summary: Returns 200 with sanitized, trust-bounded content when safe
  - id: G-HTTP-CLEAN-002
    summary: Returns 422 when required content field is missing
  - id: G-HTTP-CLEAN-003
    summary: Returns 422 when DeBERTa classifier flags injection at HIGH confidence
  - id: G-HTTP-CLEAN-004
    summary: Pipeline order is sanitize → classify → wrap
  - id: G-HTTP-CLEAN-005
    summary: >
      Bulwark may call the LLM judge endpoint as a classifier when
      judge_backend.enabled=true (ADR-033). The judge's generative
      response text never reaches /v1/clean callers — only verdict +
      confidence + latency are recorded. Sanitize-only and judge-
      disabled deployments perform zero outbound LLM calls. See
      ADR-037 / NG-JUDGE-004.
  - id: G-HTTP-CLEAN-006
    summary: DeBERTa classifier runs on sanitized content, not raw input
  - id: G-HTTP-CLEAN-007
    summary: >
      Response includes detector verdict (label + score) when the model
      is loaded. Score is the max detector score across windows
      (rounded to 4 decimals); 0.0 when the detector reports no
      injection-class label. ADR-038 / B6 closed a regression where
      the score was always null on pass.
  - id: G-HTTP-CLEAN-011
    summary: >
      Per-detector trace entries include max_score (highest score across
      all windows) and n_windows (number of chunks the detector ran on)
      when those values are available. On block, the trace entry also
      includes window_index (1-based, of the offending chunk). These
      observability fields satisfy ADR-032's per-window visibility
      requirement and let operators see whether a detector "almost
      blocked" or had to scan many windows.
  - id: G-HTTP-CLEAN-012
    summary: >
      Default content body cap is 256 KB (262144 bytes). Tunable via
      BULWARK_MAX_CONTENT_SIZE env var (positive integer, bytes). The
      previous 1 MB default was a defense-in-depth gap — even
      authenticated callers could pin a worker on tokenization or judge
      round-trip. The same cap applies to /v1/guard text. ADR-038 / B2.
  - id: G-HTTP-CLEAN-CONTENT-BYTES-001
    summary: >
      The body cap is enforced as UTF-8 *bytes*, not Python characters.
      Any /v1/clean request whose content field exceeds 262144 bytes
      (or BULWARK_MAX_CONTENT_SIZE if set) when UTF-8 encoded MUST be
      rejected with HTTP 413 and a JSON body of the form
      {"error": {"code": "content_too_large", "message": "..."}}.
      Pydantic's max_length measured Python characters, so 4-byte
      UTF-8 payloads (e.g. mathematical alphanumerics, certain emoji)
      could bypass the documented byte cap by up to 4x. ADR-042.
  - id: G-HTTP-CLEAN-008
    summary: Respects dashboard layer toggles (sanitizer, trust boundary)
  - id: G-HTTP-CLEAN-009
    summary: Emits BLOCKED events on classifier blocks to dashboard EventDB + webhooks
  - id: G-HTTP-CLEAN-010
    summary: >
      The detector examines the entire sanitized payload, not just the
      first 512 tokens. Inputs larger than the model's token window are
      split into overlapping windows (stride 64) and classified per-
      window; the response verdict is INJECTION if any window is flagged
      above threshold. See ADR-032.
  - id: G-HTTP-CLEAN-503-NO-DETECTORS-001
    summary: >
      Returns HTTP 503 with a structured error envelope
      ({"error": {"code": "no_detectors_loaded", "message": "..."}}) when
      the dashboard has zero ML detectors loaded AND the LLM judge is
      disabled AND BULWARK_ALLOW_NO_DETECTORS is unset. The 503 is the
      request-time counterpart to /healthz `degraded` (ADR-038) — both
      endpoints share the same predicate. The 503 message references
      BULWARK_ALLOW_NO_DETECTORS so operators can self-serve the opt-in.
      No BulwarkEvent is written for the 503 (the request never reached
      a detection layer). See ADR-040.

non_guarantees:
  - id: NG-HTTP-CLEAN-001
    summary: Does NOT guarantee the caller's downstream LLM is safe
    reason: Bulwark returns cleaned content; output-side safety is the caller's job via /v1/guard.
  - id: NG-HTTP-CLEAN-002
    summary: Exact trust boundary tag format is not guaranteed across versions
    reason: Tag naming is an implementation detail. Clients should not parse the result string.
  - id: NG-HTTP-CLEAN-003
    summary: Does NOT check canaries — canaries are output-side only
    reason: Canaries are for detecting LLM exfiltration; /v1/clean processes input before any LLM runs.
  - id: NG-HTTP-CLEAN-004
    summary: Does NOT guarantee sub-linear detector latency for large inputs
    reason: >
      Chunking (ADR-032) trades O(1) detector cost for O(n) in payload
      size. A 1 MB input needs hundreds of classifier windows. Operators
      needing a hard upper bound should pass `max_length` on the request
      or front the dashboard with a size-limiting proxy.
