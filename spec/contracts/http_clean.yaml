endpoint: POST /v1/clean
version: "2.0.0"

guarantees:
  - id: G-HTTP-CLEAN-001
    summary: Returns 200 with sanitized, trust-bounded content when safe
  - id: G-HTTP-CLEAN-002
    summary: Returns 422 when required content field is missing
  - id: G-HTTP-CLEAN-003
    summary: Returns 422 when DeBERTa classifier flags injection at HIGH confidence
  - id: G-HTTP-CLEAN-004
    summary: Pipeline order is sanitize → classify → wrap
  - id: G-HTTP-CLEAN-005
    summary: Bulwark never invokes an LLM — no outbound LLM calls from /v1/clean
  - id: G-HTTP-CLEAN-006
    summary: DeBERTa classifier runs on sanitized content, not raw input
  - id: G-HTTP-CLEAN-007
    summary: Response includes detector verdict (label + score) when the model is loaded
  - id: G-HTTP-CLEAN-008
    summary: Respects dashboard layer toggles (sanitizer, trust boundary)
  - id: G-HTTP-CLEAN-009
    summary: Emits BLOCKED events on classifier blocks to dashboard EventDB + webhooks
  - id: G-HTTP-CLEAN-010
    summary: >
      The detector examines the entire sanitized payload, not just the
      first 512 tokens. Inputs larger than the model's token window are
      split into overlapping windows (stride 64) and classified per-
      window; the response verdict is INJECTION if any window is flagged
      above threshold. See ADR-032.

non_guarantees:
  - id: NG-HTTP-CLEAN-001
    summary: Does NOT guarantee the caller's downstream LLM is safe
    reason: Bulwark returns cleaned content; output-side safety is the caller's job via /v1/guard.
  - id: NG-HTTP-CLEAN-002
    summary: Exact trust boundary tag format is not guaranteed across versions
    reason: Tag naming is an implementation detail. Clients should not parse the result string.
  - id: NG-HTTP-CLEAN-003
    summary: Does NOT check canaries — canaries are output-side only
    reason: Canaries are for detecting LLM exfiltration; /v1/clean processes input before any LLM runs.
  - id: NG-HTTP-CLEAN-004
    summary: Does NOT guarantee sub-linear detector latency for large inputs
    reason: >
      Chunking (ADR-032) trades O(1) detector cost for O(n) in payload
      size. A 1 MB input needs hundreds of classifier windows. Operators
      needing a hard upper bound should pass `max_length` on the request
      or front the dashboard with a size-limiting proxy.
