feature: bulwark_bench — sibling CLI for detector-configuration benchmarking
version: "2.0.0"

# v2.0.0 (ADR-034): rebuilt as a detector-config sweep. Compares
# DeBERTa-only vs DeBERTa+PromptGuard vs DeBERTa+LLM-judge (etc.) against
# the same red-team tier. Replaces the v1 model-swap harness which broke
# when v2.0.0 (ADR-031) removed llm_backend.

guarantees:
  - id: G-BENCH-001
    summary: Sweeps detector configurations sequentially against a fixed red-team tier via a running Bulwark dashboard.
    rationale: Sequential execution keeps results comparable — apples-to-apples across configs without interleaved load.

  - id: G-BENCH-002
    summary: Each configuration's run persists its result file to disk before moving to the next.
    rationale: A crashed sweep resumes with --resume; per-config results survive whole-run failure.

  - id: G-BENCH-003
    summary: With --resume, configurations whose result file already exists in the run directory are skipped.
    rationale: Long Standard-tier sweeps (3000+ probes per config) must not restart from zero after an interruption.

  - id: G-BENCH-004
    summary: Efficacy is reported as defense_rate from the red-team tier (reuses G-REDTEAM-SCORE-001..007).
    rationale: Identical metric to what the dashboard reports — single source of truth for defense quality.

  - id: G-BENCH-005
    summary: Speed is reported as avg seconds per probe, computed as duration_s / total from the tier result.
    rationale: Wall-clock per-probe is what users experience; matches dashboard display.

  - id: G-BENCH-007
    summary: Every run produces report.json (machine-readable) and report.md (human-readable table).
    rationale: JSON for diffing/history, markdown for immediate human consumption in CI and terminal.

  - id: G-BENCH-008
    summary: Markdown report sorts configurations by defense_rate descending, with a secondary sort on avg latency ascending.
    rationale: Deterministic ordering — best defender first, tie-break toward faster config.

  - id: G-BENCH-010
    summary: The runner never kills a dashboard process; configuration changes go only through PUT /api/config and POST /api/integrations/{name}/activate.
    rationale: Bench is a read-mostly orchestrator — it changes config but does not own the dashboard lifecycle.

  - id: G-BENCH-012
    summary: >
      Predefined config presets are deberta-only, deberta+promptguard,
      deberta+llm-judge, and all. DeBERTa is always on (mandatory in v2);
      presets toggle PromptGuard and LLM judge.
    rationale: Closes the v1 → v2 gap from ADR-034. Presets keep the CLI ergonomic; users can still tweak judge endpoint via --judge-base-url / --judge-model.

  - id: G-BENCH-013
    summary: >
      The runner restores the dashboard's original detector configuration
      (PromptGuard enabled state, judge_backend.enabled + base_url + model)
      when the sweep ends — including on Ctrl+C and unexpected error.
    rationale: Bench must not leave the dashboard in a different state than it found it. Restore runs in a finally block, mirroring G-BENCH-011's bypass restore.

non_guarantees:
  - id: NG-BENCH-002
    summary: Does NOT report dollar cost per configuration.
    reason: >
      v1's cost column was per-LLM-token. v2 detector configs use local
      DeBERTa/PromptGuard (free) plus an opt-in LLM judge whose price
      depends entirely on the operator's deployment (LM Studio = free,
      Anthropic = per-token). The pricing module remains in the repo
      for reference but the report drops the cost column. See ADR-034.

  - id: NG-BENCH-003
    summary: No parallel execution across configurations — sequential only.
    reason: Parallel sweeps contend for shared dashboard state (one config at a time). Explicit non-goal (see ADR-017, ADR-034).

  - id: NG-BENCH-004
    summary: Does NOT auto-discover detector capabilities (e.g. which judge models exist).
    reason: The judge endpoint and model are operator-supplied; bench validates the dashboard accepts them but doesn't probe model lists.

  - id: NG-BENCH-MODEL-SWEEP-REMOVED
    summary: The v1 multi-model sweep is removed.
    reason: ADR-031 removed llm_backend; there is no model to swap. ADR-034 documents the rebuild.
