endpoint: POST /v1/guard
version: "1.0.0"

guarantees:
  - id: G-HTTP-GUARD-001
    summary: Returns 200 with safe=true when text passes all checks
  - id: G-HTTP-GUARD-002
    summary: Returns 200 with safe=false and reason when injection detected
  - id: G-HTTP-GUARD-003
    summary: Returns 200 with safe=false and check="canary" when canary token leaked
  - id: G-HTTP-GUARD-004
    summary: Returns 422 when required text field is missing
  - id: G-HTTP-GUARD-005
    summary: When canary_tokens is null, falls back to server-configured canaries from bulwark-config.yaml
  - id: G-HTTP-GUARD-006
    summary: Text field in response is always the exact input text, unchanged
  - id: G-HTTP-GUARD-010
    summary: This is the caller-side output-check endpoint — intended for LLM output the caller produced, never for input to /v1/clean

  - id: G-HTTP-GUARD-007
    summary: Emits a BulwarkEvent to the dashboard EventDB and SSE subscribers
  - id: G-HTTP-GUARD-008
    summary: Event verdict is BLOCKED when injection/canary detected, PASSED when safe
  - id: G-HTTP-GUARD-009
    summary: >
      canary_tokens is bounded — max 64 entries, each key 1..64 chars,
      each value 1..256 chars. Oversized submissions return 422. Closes
      the Codex DoS finding where attacker-controlled canary_tokens
      forced linear CPU cost (5k tokens × 1M text ≈ 21 s per request)
      on an unauthenticated endpoint. See ADR-030.
  - id: G-HTTP-GUARD-CONTENT-BYTES-001
    summary: >
      /v1/guard MUST reject any request whose text field exceeds
      262144 bytes (or BULWARK_MAX_CONTENT_SIZE if set) when UTF-8
      encoded with HTTP 413 and a JSON body of the form
      {"error": {"code": "content_too_large", "message": "..."}}.
      Mirrors G-HTTP-CLEAN-CONTENT-BYTES-001 — the same byte cap
      applies to both endpoints so an attacker cannot launder
      oversized payloads through the output-side endpoint instead
      of /v1/clean. ADR-042.

non_guarantees:
  - id: NG-HTTP-GUARD-001
    summary: Exact reason string format is not guaranteed across versions
    reason: Error messages may be tuned. Clients should check safe=true/false, not parse reason.
  - id: NG-HTTP-GUARD-002
    summary: Does NOT provide per-request rate limiting
    reason: >
      G-HTTP-GUARD-009 bounds CPU cost per request; it does not bound
      request frequency. Operators needing rate limits should front the
      dashboard with a reverse proxy. Consistent with the ADR-030
      scope note that in-process rate limiting is out of scope.
