feature: Dashboard bearer token authentication
version: "1.0.0"

guarantees:
  - id: G-AUTH-001
    summary: When BULWARK_API_TOKEN is set, protected endpoints return 401 without valid token
  - id: G-AUTH-002
    summary: Public endpoints (/healthz, /v1/clean, /v1/guard, /v1/pipeline) work without auth
  - id: G-AUTH-003
    summary: >
      When BULWARK_API_TOKEN is not set, GET/HEAD requests on any endpoint
      succeed without auth (convenient for local monitoring probes that
      scrape /api/events, /api/metrics, etc.). Mutating methods are
      subject to G-AUTH-007.
  - id: G-AUTH-004
    summary: POST /api/auth/login validates token and sets HttpOnly cookie
  - id: G-AUTH-005
    summary: Cookie-based auth works for SSE EventSource connections
  - id: G-AUTH-006
    summary: OPTIONS requests pass through for CORS preflight
  - id: G-AUTH-007
    summary: >
      When BULWARK_API_TOKEN is not set, mutating requests
      (POST/PUT/DELETE/PATCH) on non-public endpoints return 403 unless
      the client is on the loopback interface (127.0.0.0/8 or ::1).
      Closes the Codex finding "Unauthenticated runtime config API lets
      clients disable defenses" by making the secure default the default.
      Callers wanting to toggle config from a remote client must set
      BULWARK_API_TOKEN and authenticate. See ADR-029.
  - id: G-AUTH-008
    summary: >
      /v1/clean leaves the always-public allowlist when BULWARK_API_TOKEN
      is set AND an LLM backend is configured (mode is "anthropic" or
      "openai_compatible"). In that state it requires Bearer or cookie
      auth like any other protected endpoint. Sanitize-only deployments
      (mode="none") and token-unset deployments keep the open default.
      Closes the Codex finding "Public /v1/clean now triggers LLM
      pipeline without auth" — unauth LLM invocation with the
      operator's API key is cost-abuse. See ADR-030.

non_guarantees:
  - id: NG-AUTH-001
    summary: Does NOT provide user accounts or role-based access control
    reason: Single-tenant tool. One token protects the whole dashboard.
  - id: NG-AUTH-002
    summary: Does NOT encrypt the token at rest
    reason: Token is an environment variable, same as API keys. Secure your env.
  - id: NG-AUTH-003
    summary: Does NOT honour X-Forwarded-For when deciding loopback eligibility
    reason: >
      The loopback check (G-AUTH-004) reads request.client.host directly.
      Operators who terminate TLS in a reverse proxy and still want
      remote mutation must set BULWARK_API_TOKEN. Trusting
      X-Forwarded-For by default would let any upstream client claim
      loopback, defeating the fix. See ADR-029.
