feature: External webhook alerting on BLOCKED events
version: "1.1.0"
module: bulwark.dashboard (config) + bulwark.events.WebhookEmitter (delivery)

guarantees:
  - id: G-WEBHOOK-001
    summary: >
      When `webhook_url` is empty or unset, no external POST is made on
      any event. The dashboard's internal EventDB + SSE stream still
      receive events as normal.
  - id: G-WEBHOOK-002
    summary: >
      When `webhook_url` is set AND an event's verdict is "blocked",
      a single HTTP POST is issued to that URL with the event payload.
      Non-blocked verdicts (passed, neutralized, etc.) do not fire the
      webhook — see ADR-026 for rationale.
  - id: G-WEBHOOK-003
    summary: >
      The webhook body is `{"events": [<event>]}` where <event> has
      timestamp, layer, verdict, source_id, detail, duration_ms, and
      metadata fields. Same wire format the internal ingestion
      endpoint accepts — a caller can point BULWARK_WEBHOOK_URL at
      another Bulwark's `/api/events` for federation.
  - id: G-WEBHOOK-004
    summary: >
      POSTs are fire-and-forget: delivered in a daemon thread with a
      short timeout. Failures (network error, 5xx response, timeout)
      are swallowed so the primary `/v1/clean` request is never delayed
      or failed by an unreachable webhook.
  - id: G-WEBHOOK-005
    summary: >
      `webhook_url` accepts only `http://` and `https://` schemes;
      other schemes raise ValueError at emitter construction time.
      Prevents operators accidentally pointing the webhook at file://
      or similar non-network destinations.
  - id: G-WEBHOOK-006
    summary: >
      The BULWARK_WEBHOOK_URL environment variable, when set, wins over
      any webhook_url persisted to bulwark-config.yaml. Matches the
      ADR-022 env-shadowing pattern used by LLM backend fields: env
      provides the default, UI/API can override for the session, save()
      blanks env-shadowed fields so the env remains authoritative.
  - id: G-WEBHOOK-007
    summary: >
      webhook_url is rejected at config-write time when it points at a
      private, link-local, or cloud-metadata host — reusing the same
      allowlist the LLM backend check applies (localhost,
      host.docker.internal, BULWARK_ALLOWED_HOSTS). _fire_webhook
      performs the same check defensively at emit time so a stale
      config file loaded from disk cannot become an SSRF vector.
      Closes the Codex SSRF finding from 2026-04-20. See ADR-030.
  - id: G-WEBHOOK-008
    summary: >
      Hostnames in webhook_url and judge_backend.base_url are resolved
      via getaddrinfo and EVERY resolved IP is checked against the
      private/loopback/link-local/metadata blacklist. A hostname like
      `evil.com` that resolves to 127.0.0.1 or 169.254.169.254 is
      rejected, closing the gap where literal-IP-only checks let
      hostname-based SSRF through. Resolutions are cached for 60
      seconds per process to avoid DNS amplification. Hosts in
      _ALWAYS_ALLOWED (localhost, host.docker.internal) or
      BULWARK_ALLOWED_HOSTS skip the resolve step. ADR-038 / B3.

non_guarantees:
  - id: NG-WEBHOOK-001
    summary: No retries on delivery failure
    reason: >
      Fire-and-forget; a dropped event stays in EventDB but is not
      re-delivered externally. Retry logic belongs in a downstream
      alert router (most ops teams already run one).
  - id: NG-WEBHOOK-002
    summary: Only one webhook URL per deployment
    reason: >
      Callers needing fan-out (Slack AND PagerDuty AND Datadog) should
      point this at a router that does the multiplexing. Keeps the
      Bulwark surface a single URL.
  - id: NG-WEBHOOK-003
    summary: No per-layer or per-source filter beyond verdict
    reason: >
      Verdict == "blocked" is the single inclusion rule. Receivers
      that want to split on layer can read the `layer` field in the
      payload. Adding server-side filters widens the contract surface
      without clear need.
  - id: NG-WEBHOOK-004
    summary: No authentication headers added to the POST
    reason: >
      Slack / Datadog / most SaaS webhooks authenticate via URL-embedded
      secrets. Operators needing header-based auth should front this
      with a reverse proxy. Avoids a credentials-in-config surface.
  - id: NG-WEBHOOK-005
    summary: Does NOT HTTP-probe the URL at config-write time
    reason: >
      The config validator rejects private/metadata hosts AND (per
      ADR-039 / B3 / G-WEBHOOK-008) hostnames that resolve to a private
      IP. It does NOT HTTP-GET the endpoint. An operator who sets
      webhook_url to a host that resolves publicly but whose endpoint
      returns 4xx/5xx or refuses connections gets a config-write
      success and silent fire-and-forget failures at emit time.
      Matches G-WEBHOOK-004's fire-and-forget contract.
  - id: NG-WEBHOOK-006
    summary: Does NOT pin the resolved IP at webhook fire time
    reason: >
      G-WEBHOOK-008 resolves the host and validates every IP it sees.
      The actual httpx.post() call then performs ITS OWN DNS lookup
      via the OS resolver — Bulwark does not pass the validated IP
      through. An attacker who controls a DNS record and flips it from
      a public IP (validation time) to a private IP (fire time) within
      the 60s validation cache window can cause Bulwark to emit at a
      private host. The window is bounded but real. Operators in
      adversarial-DNS environments should front the webhook receiver
      with a known-IP reverse proxy or set BULWARK_ALLOWED_HOSTS to
      the proxy hostname so the resolve check is skipped explicitly.
      Closing this fully requires IP-pinning the httpx transport,
      which is a larger change deferred to a future ADR.
