openapi: "3.1.0"
info:
  title: Bulwark API
  version: "0.5.0"
  description: |
    Language-agnostic HTTP API for Bulwark prompt injection defense.

    Core endpoints: /v1/clean sanitizes untrusted content, /v1/guard checks
    LLM output for injection patterns, /v1/pipeline runs the full defense
    stack. All return 200 for completed analysis. 422 only for malformed requests.
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local dashboard (default)

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 with version info. Used by Docker HEALTHCHECK and k8s probes.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - version
                properties:
                  status:
                    type: string
                    enum: ["ok"]
                  version:
                    type: string
                    description: Current Bulwark version from VERSION file.
                  docker:
                    type: boolean
                    description: True if running inside a Docker container.

  /v1/clean:
    post:
      operationId: clean
      summary: Sanitize untrusted content and wrap in trust boundary tags
      description: |
        Maps to bulwark.clean(). Strips hidden characters, steganography, and
        encoding tricks, then wraps in trust boundary tags. The result is safe
        to interpolate into any LLM prompt.

        This provides input sanitization + trust boundary tagging, not full
        architectural defense. For two-phase execution, use the Pipeline Python API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanRequest"
      responses:
        "200":
          description: Content sanitized and trust-boundary-tagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanResponse"
        "422":
          description: Validation error (missing required fields, wrong types)

  /v1/guard:
    post:
      operationId: guard
      summary: Check LLM output for injection patterns and canary leaks
      description: |
        Maps to bulwark.guard(). Checks text against regex-based injection
        patterns and optional canary token leaks. Always returns 200 with
        safe=true/false. The request succeeded; the analysis result may be "unsafe."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardRequest"
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardResponse"
        "422":
          description: Validation error (missing required fields, wrong types)

  /v1/pipeline:
    post:
      operationId: pipeline
      summary: Run content through the full Bulwark pipeline
      description: |
        Runs untrusted content through the complete Bulwark pipeline including
        sanitization, trust boundary tagging, detection models (if activated),
        LLM-backed two-phase execution (if configured), bridge guard, and
        canary token checks. Returns full pipeline trace with per-layer timing.

        Without an LLM configured, runs sanitizer + trust boundary + guard only.
        Detection models run BEFORE the LLM — if they catch injection, the LLM
        call is skipped entirely.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: Untrusted content to process through the pipeline.
                source:
                  type: string
                  default: external
                  description: Source label for trust boundary tags.
      responses:
        "200":
          description: Pipeline execution complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineResponse"
        "422":
          description: Validation error (missing required fields, wrong types)

  /v1/llm/test:
    post:
      operationId: testLlmConnection
      summary: Test the configured LLM backend connection
      description: |
        Sends a minimal test prompt to the configured LLM backend and returns
        whether the connection succeeded. Used by the dashboard Configure tab.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: ["none", "anthropic", "openai_compatible"]
                api_key:
                  type: string
                base_url:
                  type: string
                  description: Base URL for OpenAI-compatible endpoints. Must not target internal/private networks.
                analyze_model:
                  type: string
                execute_model:
                  type: string
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  model:
                    type: string

  /v1/llm/models:
    post:
      operationId: listLlmModels
      summary: List available models for the configured LLM backend
      description: |
        Returns models available for the given backend configuration.
        For Anthropic: returns the supported model family aliases.
        For OpenAI-compatible: queries the endpoint's /models API.
        Used by the dashboard Configure tab to populate model dropdowns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: ["none", "anthropic", "openai_compatible"]
                api_key:
                  type: string
                base_url:
                  type: string
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        recommended_for:
                          type: array
                          items:
                            type: string
                            enum: ["analyze", "execute"]

  /api/redteam/tiers:
    get:
      operationId: redteamTiers
      summary: List available red team scan tiers with dynamic probe counts
      description: |
        Returns the three scan tiers (Quick Scan, Standard Scan, Full Sweep)
        with probe counts pulled dynamically from the installed garak version.
        Counts reflect probe classes, not individual payloads (payloads load lazily).
        Used by the dashboard red team UI to render tier selection cards.
      responses:
        "200":
          description: Tier definitions with counts
          content:
            application/json:
              schema:
                type: object
                required:
                  - tiers
                  - garak_installed
                properties:
                  garak_installed:
                    type: boolean
                  garak_version:
                    type: string
                  tiers:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                        - description
                        - probe_count
                        - families
                      properties:
                        id:
                          type: string
                          enum: ["quick", "standard", "full"]
                        name:
                          type: string
                        description:
                          type: string
                        probe_count:
                          type: integer
                          description: Number of probe classes in this tier (from garak)
                        families:
                          type: array
                          items:
                            type: string
                          description: Garak probe family names included in this tier

  /api/redteam/reports:
    get:
      operationId: listRedteamReports
      summary: List saved red team reports
      description: |
        Returns metadata for all persisted red team reports, sorted newest first.
        Reports are saved automatically when a scan completes. Each entry includes
        the tier, timestamp, probe count, defense rate, and filename for download.
      responses:
        "200":
          description: List of saved reports
          content:
            application/json:
              schema:
                type: object
                required:
                  - reports
                properties:
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        tier:
                          type: string
                        completed_at:
                          type: string
                          format: date-time
                        total:
                          type: integer
                        defended:
                          type: integer
                        vulnerable:
                          type: integer
                        defense_rate:
                          type: number
                        duration_s:
                          type: number

  /api/redteam/reports/{filename}:
    get:
      operationId: downloadRedteamReport
      summary: Download a saved red team report as JSON
      description: |
        Returns the full red team report JSON for the given filename.
        Filenames are validated to prevent path traversal — only files matching
        the pattern redteam-*.json in the reports directory are served.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full report JSON
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Report not found or invalid filename

components:
  schemas:
    CleanRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: Untrusted text to sanitize and wrap in trust boundary tags.
        source:
          type: string
          default: external
          description: Where the content came from. Used in the trust boundary tag name.
        label:
          type: string
          nullable: true
          default: null
          description: Optional label for the trust boundary tag name. Overrides source in tag.
        max_length:
          type: integer
          nullable: true
          default: null
          minimum: 1
          description: Truncate content after sanitizing. null = no limit (default).
        format:
          type: string
          enum:
            - xml
            - markdown
            - delimiter
          default: xml
          description: |
            Trust boundary format. "xml" (default, best for Claude),
            "markdown", or "delimiter". Non-Claude models may work better
            with "markdown" or "delimiter".

    CleanResponse:
      type: object
      required:
        - result
        - source
        - format
        - content_length
        - result_length
        - modified
      properties:
        result:
          type: string
          description: Sanitized content wrapped in trust boundary tags. Safe to interpolate into an LLM prompt.
        source:
          type: string
          description: Echo of the source parameter used.
        format:
          type: string
          description: Echo of the format used.
        content_length:
          type: integer
          description: Length of the original content before processing.
        result_length:
          type: integer
          description: Length of the result after processing.
        modified:
          type: boolean
          description: True if the sanitizer modified the content (stripped characters).

    GuardRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: LLM output to check for injection patterns and canary token leaks.
        canary_tokens:
          type: object
          nullable: true
          default: null
          additionalProperties:
            type: string
          description: |
            Optional map of source_name to canary token string for leak detection.
            If null, canary check is skipped.

    GuardResponse:
      type: object
      required:
        - safe
        - text
      properties:
        safe:
          type: boolean
          description: True if the text passed all checks. False if injection or canary leak detected.
        text:
          type: string
          description: The input text, unchanged.
        reason:
          type: string
          nullable: true
          default: null
          description: If not safe, the reason. null if safe.
        check:
          type: string
          nullable: true
          enum:
            - injection
            - canary
            - null
          default: null
          description: Which check triggered the block, if any.

    PipelineResponse:
      type: object
      required:
        - blocked
        - trace
      properties:
        blocked:
          type: boolean
          description: True if any layer blocked the content.
        blocked_at:
          type: string
          nullable: true
          description: Which layer blocked the content, if any.
        block_reason:
          type: string
          nullable: true
          description: Human-readable reason for blocking, if any.
        analysis:
          type: string
          nullable: true
          description: LLM Phase 1 analysis output, if LLM was configured and ran.
        execution:
          type: string
          nullable: true
          description: LLM Phase 2 execution output, if LLM was configured and ran.
        payload_length:
          type: integer
          description: Length of the original input content.
        neutralized:
          type: boolean
          description: True if the sanitizer modified the content.
        neutralized_by:
          type: string
          nullable: true
          description: Which sanitization step modified the content, if any.
        llm_mode:
          type: string
          nullable: true
          description: Which LLM backend mode was used (none, anthropic, openai_compatible).
        trace:
          type: array
          description: Per-layer trace entries with step number, layer name, verdict, detail, and timing.
          items:
            type: object
            properties:
              step:
                type: integer
              layer:
                type: string
              verdict:
                type: string
                enum: ["passed", "blocked", "modified"]
              detail:
                type: string
              duration_ms:
                type: number
              detection_model:
                type: string
                description: Name of the detection model, if this is a detection layer entry.
              backend:
                type: string
                description: LLM backend type, if this is an analyze/execute layer entry.
              model:
                type: string
                description: Model identifier used, if this is an analyze/execute layer entry.
