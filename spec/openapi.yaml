openapi: "3.1.0"
info:
  title: Bulwark API
  version: "2.0.0"
  description: |
    Language-agnostic HTTP API for Bulwark prompt injection defense.

    v2.0.0 (ADR-031) — Bulwark is a detection-only service. It returns
    safe, cleaned content or an error. It never calls an LLM. The caller
    owns the LLM.

    /v1/clean is the primary endpoint — runs sanitizer + DeBERTa classifier
    + trust-boundary wrap. Returns 200 with cleaned content when safe,
    422 when injection detected.

    /v1/guard is the output-side endpoint — called by the user on their
    own LLM's output to check for injection patterns and canary leaks.
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local dashboard (default)

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe with detector load state
      description: |
        Returns 200 with status and detector load state. Status is "degraded"
        when zero detectors loaded AND the LLM judge is disabled AND
        BULWARK_ALLOW_SANITIZE_ONLY is unset. See ADR-038.
      responses:
        "200":
          description: Service is healthy or degraded (always 200; check status field)
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - version
                  - detectors
                properties:
                  status:
                    type: string
                    enum: ["ok", "degraded"]
                  reason:
                    type: string
                    description: Present when status=="degraded". e.g. "no_detectors_loaded".
                  version:
                    type: string
                    description: Current Bulwark version from VERSION file.
                  docker:
                    type: boolean
                    description: True if running inside a Docker container.
                  auth_required:
                    type: boolean
                    description: True if BULWARK_API_TOKEN is set.
                  detectors:
                    type: object
                    description: Detection-chain load state captured at startup.
                    properties:
                      loaded:
                        type: array
                        items: { type: string }
                        description: Names of detectors that loaded successfully.
                      failed:
                        type: object
                        additionalProperties: { type: string }
                        description: Map of detector name → first 200 chars of the load exception.

  /v1/clean:
    post:
      operationId: clean
      summary: Sanitize, classify, and wrap untrusted content
      description: |
        The primary Bulwark endpoint. Pipeline:
          1. Sanitizer — strip bidi, emoji smuggling, unicode tricks.
          2. DeBERTa / PromptGuard classifiers — HIGH-confidence injection → 422.
          3. Optional LLM judge classifier (ADR-033) when judge_backend.enabled.
          4. Trust boundary wrap — content returned in <untrusted_input>…</>.

        Returns 200 with the cleaned, wrapped content when safe. The caller
        feeds `result` into their own LLM.

        Returns 422 when any classifier blocks. The LLM judge is a classifier:
        only its verdict + confidence + latency reach the response (NG-JUDGE-004).
        Generative judge text never leaks to /v1/clean callers.

        Returns 503 with `error.code = "no_detectors_loaded"` when the
        dashboard has zero ML detectors loaded AND the LLM judge is
        disabled AND `BULWARK_ALLOW_NO_DETECTORS` is unset. The
        sanitizer-only path is never silently served. See ADR-040.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanRequest"
      responses:
        "200":
          description: Content passed all checks — safe result returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanResponse"
        "401":
          description: |
            Auth required but not supplied. Returned when BULWARK_API_TOKEN
            is set and the request comes from a non-loopback client without
            a valid Bearer header or session cookie. Loopback clients
            (127.0.0.0/8, ::1) bypass this check by ADR-029. Independent
            of LLM judge state. See G-AUTH-CLEAN-001 / ADR-041.
        "413":
          description: |
            Request `content` exceeds the configured byte cap when UTF-8
            encoded (default 262144 bytes; tunable via
            `BULWARK_MAX_CONTENT_SIZE`). Body shape:
            `{"error": {"code": "content_too_large", "message": "..."}}`.
            See G-HTTP-CLEAN-CONTENT-BYTES-001 / ADR-042.
        "422":
          description: Injection detected or validation error. Content blocked.
        "503":
          description: |
            No detectors loaded and operator has not opted into sanitize-
            only mode (BULWARK_ALLOW_NO_DETECTORS unset). See ADR-040.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code:
                        type: string
                        enum: ["no_detectors_loaded"]
                      message:
                        type: string
                        description: Human-readable explanation; references the env var operators can set to opt in.

  /v1/guard:
    post:
      operationId: guard
      summary: Check caller's own LLM output for injection patterns and canary leaks
      description: |
        The output-side endpoint. The caller runs their own LLM on the
        cleaned content returned by /v1/clean, then calls /v1/guard on
        the LLM's output to check for injection patterns (the LLM was
        tricked into echoing attacker instructions) and canary leaks
        (the LLM exfiltrated a sentinel string).

        Always returns 200 with safe=true/false. The request succeeded;
        the analysis result may be "unsafe."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardRequest"
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardResponse"
        "413":
          description: |
            Request `text` exceeds the configured byte cap when UTF-8
            encoded (default 262144 bytes; tunable via
            `BULWARK_MAX_CONTENT_SIZE`). Body shape:
            `{"error": {"code": "content_too_large", "message": "..."}}`.
            See G-HTTP-GUARD-CONTENT-BYTES-001 / ADR-042.
        "422":
          description: Validation error (missing required fields, wrong types)

  /api/presets:
    get:
      operationId: listPresets
      summary: List attack presets for the dashboard payload library
      description: |
        Returns the attack-preset library. Source of truth is spec/presets.yaml
        (ADR-021). Consumed by the dashboard Test page. Public (no auth) because
        presets are documented threat-model examples, not sensitive data.
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: object
                required:
                  - presets
                properties:
                  presets:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                        - family
                        - payload
                      properties:
                        id:
                          type: string
                          description: Stable identifier (slug).
                        name:
                          type: string
                          description: Display name.
                        family:
                          type: string
                          enum: ["sanitizer", "boundary", "detection", "canary"]
                          description: Pipeline stage expected to block this preset.
                        payload:
                          type: string
                          description: Literal string sent to /v1/clean.
                        description:
                          type: string
                          description: Optional explanation surfaced as a tooltip.

  /api/canaries:
    get:
      operationId: listCanaries
      summary: List configured canary tokens
      description: |
        Returns every canary currently configured in bulwark-config.yaml.
        Canaries are sentinel strings the caller watches for in their own
        LLM output via /v1/guard (ADR-025, ADR-031). Canaries are never
        checked on input to /v1/clean.
      responses:
        "200":
          description: Canary list
          content:
            application/json:
              schema:
                type: object
                required:
                  - canaries
                properties:
                  canaries:
                    type: array
                    items:
                      type: object
                      required:
                        - label
                        - token
                      properties:
                        label:
                          type: string
                          description: Source identifier (e.g. "aws_access_key").
                        token:
                          type: string
                          description: The sentinel string to watch for in LLM output.
    post:
      operationId: upsertCanary
      summary: Create or rotate a canary token
      description: |
        Upserts a canary by label. Pass `token` to set a literal value, or
        `shape` to have Bulwark generate one matching a known credential
        format (aws, bearer, password, url, mongo). POSTing against an
        existing label rotates the token; no grace period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
              properties:
                label:
                  type: string
                  minLength: 1
                  maxLength: 64
                  description: Stable identifier; must not contain whitespace.
                token:
                  type: string
                  minLength: 8
                  description: Literal canary string. Wins if both token and shape are given.
                shape:
                  type: string
                  enum: ["aws", "bearer", "password", "url", "mongo"]
                  description: Generate a canary matching this credential format.
      responses:
        "200":
          description: Canary created or rotated
          content:
            application/json:
              schema:
                type: object
                required:
                  - label
                  - token
                properties:
                  label:
                    type: string
                  token:
                    type: string
        "400":
          description: Invalid label, missing token AND shape, or unknown shape
        "401":
          description: Auth required but not supplied (when BULWARK_API_TOKEN is set)

  /api/canaries/{label}:
    delete:
      operationId: deleteCanary
      summary: Remove a canary by label
      description: |
        Deletes the named canary and persists the updated config. Idempotent
        from the caller's perspective: a second delete returns 404.
      parameters:
        - name: label
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Canary removed
        "404":
          description: No canary with that label
        "401":
          description: Auth required but not supplied (when BULWARK_API_TOKEN is set)

  /api/redteam/tiers:
    get:
      operationId: redteamTiers
      summary: List available red team scan tiers with dynamic probe counts
      description: |
        Returns the three scan tiers (Quick Scan, Standard Scan, Full Sweep)
        with probe counts pulled dynamically from the installed garak version.
      responses:
        "200":
          description: Tier definitions with counts
          content:
            application/json:
              schema:
                type: object
                required:
                  - tiers
                  - garak_installed
                properties:
                  garak_installed:
                    type: boolean
                  garak_version:
                    type: string
                  tiers:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                        - description
                        - probe_count
                        - families
                      properties:
                        id:
                          type: string
                          enum: ["quick", "standard", "full"]
                        name:
                          type: string
                        description:
                          type: string
                        probe_count:
                          type: integer
                        families:
                          type: array
                          items:
                            type: string

  /api/redteam/reports:
    get:
      operationId: listRedteamReports
      summary: List saved red team reports
      description: |
        Returns metadata for all persisted red team reports, sorted newest first.
      responses:
        "200":
          description: List of saved reports
          content:
            application/json:
              schema:
                type: object
                required:
                  - reports
                properties:
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        tier:
                          type: string
                        completed_at:
                          type: string
                          format: date-time
                        total:
                          type: integer
                        defended:
                          type: integer
                        vulnerable:
                          type: integer
                        hijacked:
                          type: integer
                        defense_rate:
                          type: number
                        duration_s:
                          type: number

  /api/redteam/reports/{filename}:
    get:
      operationId: downloadRedteamReport
      summary: Download a saved red team report as JSON
      description: |
        Returns the full red team report JSON for the given filename.
        Filenames are validated to prevent path traversal.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full report JSON
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Report not found or invalid filename

  /api/redteam/retest:
    post:
      operationId: retestRedteam
      summary: Re-run only the non-defended probes from a previous report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
              properties:
                filename:
                  type: string
      responses:
        "200":
          description: Retest started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["started", "error"]
                  message:
                    type: string

components:
  schemas:
    CleanRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: |
            Untrusted text to sanitize and wrap in trust boundary tags.
            Server enforces a UTF-8 *byte* cap (default 262144 bytes / 256
            KiB; override with `BULWARK_MAX_CONTENT_SIZE`). Requests over
            the cap are rejected with HTTP 413 and
            `{"error": {"code": "content_too_large", ...}}`. ADR-042 /
            G-HTTP-CLEAN-CONTENT-BYTES-001.
        source:
          type: string
          default: external
          description: Where the content came from. Used in the trust boundary tag name.
        label:
          type: string
          nullable: true
          default: null
          description: Optional label for the trust boundary tag name. Overrides source in tag.
        max_length:
          type: integer
          nullable: true
          default: null
          minimum: 1
          description: Truncate content after sanitizing. null = no limit (default).
        format:
          type: string
          enum:
            - xml
            - markdown
            - delimiter
          default: xml
          description: |
            Trust boundary format. "xml" (default, best for Claude),
            "markdown", or "delimiter".

    CleanResponse:
      type: object
      required:
        - result
        - source
        - format
        - content_length
        - result_length
        - modified
      properties:
        result:
          type: string
          description: Sanitized content wrapped in trust boundary tags. Safe to interpolate into an LLM prompt.
        source:
          type: string
          description: Echo of the source parameter used.
        format:
          type: string
          description: Echo of the format used.
        content_length:
          type: integer
          description: Length of the original content before processing.
        result_length:
          type: integer
          description: Length of the result after processing.
        modified:
          type: boolean
          description: True if the sanitizer modified the content (stripped characters).
        detector:
          type: object
          nullable: true
          description: DeBERTa classifier verdict, if the model was loaded.
          properties:
            label:
              type: string
              description: Classifier output label (SAFE or INJECTION).
            score:
              type: number
              description: Classifier confidence score.
        mode:
          type: string
          nullable: true
          enum: ["degraded-explicit"]
          description: |
            Set to "degraded-explicit" when BULWARK_ALLOW_NO_DETECTORS=1
            and the request was served sanitize-only with zero detectors
            available. Absent in normal (defended) responses. See ADR-040.

    GuardRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: |
            LLM output to check for injection patterns and canary token leaks.
            Server enforces the same UTF-8 *byte* cap as `/v1/clean` (default
            262144 bytes / 256 KiB; override with `BULWARK_MAX_CONTENT_SIZE`).
            Requests over the cap are rejected with HTTP 413 and
            `{"error": {"code": "content_too_large", ...}}`. ADR-042 /
            G-HTTP-GUARD-CONTENT-BYTES-001.
        canary_tokens:
          type: object
          nullable: true
          default: null
          additionalProperties:
            type: string
          description: |
            Optional map of source_name to canary token string for leak detection.
            If null, the server uses canaries configured in bulwark-config.yaml.

    GuardResponse:
      type: object
      required:
        - safe
        - text
      properties:
        safe:
          type: boolean
          description: True if the text passed all checks. False if injection or canary leak detected.
        text:
          type: string
          description: The input text, unchanged.
        reason:
          type: string
          nullable: true
          default: null
          description: If not safe, the reason. null if safe.
        check:
          type: string
          nullable: true
          enum:
            - injection
            - canary
            - null
          default: null
          description: Which check triggered the block, if any.
