# Run Bulwark against a local LLM endpoint (LM Studio, Ollama, etc.).
#
# Setup:
#   1. Copy .env.example to .env (or create .env) and fill in your local
#      values — see the env_file block below for the expected vars.
#   2. docker compose up -d
#
# The config file (canary tokens, guard patterns, UI edits) is bind-mounted
# from ${BULWARK_CONFIG_PATH:-$HOME/.config/bulwark/bulwark-config.yaml}
# so it survives container recreation. If the host path doesn't exist,
# create an empty file first: `mkdir -p ~/.config/bulwark && touch ~/.config/bulwark/bulwark-config.yaml`.
#
# For local development (building from source instead of pulling the
# published image), comment out `image:` and uncomment `build: .`.

services:
  bulwark:
    image: nathandonaldson/bulwark:1.3.1
    # build: .
    container_name: bulwark
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ${BULWARK_CONFIG_PATH:-${HOME}/.config/bulwark/bulwark-config.yaml}:/app/bulwark-config.yaml
    env_file:
      # .env provides BULWARK_LLM_MODE, BULWARK_API_KEY, BULWARK_BASE_URL,
      # BULWARK_ANALYZE_MODEL, BULWARK_EXECUTE_MODEL, BULWARK_ALLOWED_HOSTS,
      # and HF_TOKEN if you use gated detection models. Never commit .env.
      - .env
    environment:
      - BULWARK_PROJECT_DIR=/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
