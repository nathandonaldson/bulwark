name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest click pyyaml
          # bench extra provides httpx for bulwark_bench.bulwark_client;
          # dashboard extra provides FastAPI/httpx so test_http_api.py and
          # test_spec_compliance.py run their FastAPI-gated suites instead
          # of skipping.
          pip install -e ".[cli,bench,dashboard]"

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short
