name: Docker Build & Publish

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bulwark

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bulwark:test .

      - name: Smoke test — container starts and serves API
        run: |
          docker run -d --name bulwark-test -p 3000:3000 bulwark:test
          sleep 5
          curl -sf http://localhost:3000/healthz | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Bad status: {d}'; print(f'healthz OK: v{d[\"version\"]}')"
          curl -sf -X POST http://localhost:3000/v1/clean -H 'Content-Type: application/json' -d '{"content":"test <script>alert(1)</script>"}' | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['modified']==True, f'Expected modified: {d}'; print('v1/clean OK')"
          docker stop bulwark-test

      - name: Log in to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag bulwark:test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker tag bulwark:test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
