name: Docker Build & Publish

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: nathandonaldson/bulwark

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build amd64-only first and load into the local daemon so the smoke
      # test below runs at native runner speed. A later step does the real
      # multi-arch push.
      - name: Build (amd64 for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: bulwark:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and serves API
        run: |
          docker run -d --name bulwark-test -p 3000:3000 bulwark:test
          sleep 5
          curl -sf http://localhost:3000/healthz | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Bad status: {d}'; print(f'healthz OK: v{d[\"version\"]}')"
          curl -sf -X POST http://localhost:3000/v1/clean -H 'Content-Type: application/json' -d '{"content":"test <script>alert(1)</script>"}' | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['modified']==True, f'Expected modified: {d}'; print('v1/clean OK')"
          docker stop bulwark-test

      - name: Log in to Docker Hub
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Multi-arch build + push. Re-uses the GHA cache from the amd64 build,
      # so the amd64 layers come out of cache and only arm64 builds fresh.
      - name: Build and push (multi-arch — versioned + latest)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (multi-arch — latest only, manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
