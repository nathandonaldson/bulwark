name: Docker Build & Publish

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: nathandonaldson/bulwark

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build amd64-only first and load into the local daemon so the smoke
      # test below runs at native runner speed. A later step does the real
      # multi-arch push.
      - name: Build (amd64 for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: bulwark:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and serves API
        run: |
          set -euo pipefail
          # ADR-038 makes /healthz report status=degraded when no detectors are
          # loaded; ADR-040 makes /v1/clean fail closed (HTTP 503) in the same
          # state. The bare image has no model weights baked in, so the smoke
          # test must opt into the degraded-explicit posture for both endpoints
          # to behave like an operator's sanitize-only deployment.
          docker run -d --name bulwark-test -p 3000:3000 \
            -e BULWARK_ALLOW_SANITIZE_ONLY=1 \
            -e BULWARK_ALLOW_NO_DETECTORS=1 \
            bulwark:test

          # Poll /healthz until it's ready instead of guessing at a sleep
          # duration. If we pass the deadline, or the container exits early,
          # fail loud and dump logs so the next regression isn't silent.
          deadline=$((SECONDS + 60))
          until curl -sf -o /tmp/healthz.json http://localhost:3000/healthz 2>/dev/null; do
            if ! docker ps --filter name=bulwark-test --filter status=running --format '{{.Names}}' | grep -q bulwark-test; then
              echo "::error::container exited before serving /healthz"
              docker logs bulwark-test
              exit 1
            fi
            if (( SECONDS > deadline )); then
              echo "::error::/healthz did not respond within 60s"
              docker logs bulwark-test
              exit 1
            fi
            sleep 1
          done

          python3 -c "import sys,json; d=json.load(open('/tmp/healthz.json')); assert d['status']=='ok', f'Bad status: {d}'; print(f'healthz OK: v{d[\"version\"]}')"
          curl -sf -X POST http://localhost:3000/v1/clean -H 'Content-Type: application/json' -d '{"content":"test <script>alert(1)</script>"}' | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['modified']==True, f'Expected modified: {d}'; print('v1/clean OK')"

          # G-PRESETS-007 / ADR-023: presets endpoint serves the wheel-bundled YAML
          curl -sf http://localhost:3000/api/presets | python3 -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d.get('presets'),list) and d['presets'], f'Bad presets: {d}'; print(f'presets OK: {len(d[\"presets\"])} loaded')"

          docker stop bulwark-test

      - name: Dump container logs on failure
        if: failure()
        run: docker logs bulwark-test || true

      - name: Log in to Docker Hub
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Multi-arch build + push. Re-uses the GHA cache from the amd64 build,
      # so the amd64 layers come out of cache and only arm64 builds fresh.
      - name: Build and push (multi-arch — versioned + latest)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (multi-arch — latest only, manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
