<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulwark Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Surfaces — cooler and deeper than before */
    --bg: #07090d;
    --bg-2: #0b0f16;
    --surface: #0f141d;
    --surface-2: #141a25;
    --surface-3: #1a2230;
    --border: #1d2532;
    --border-2: #2a3446;
    --hairline: #151c28;

    --text: #e6eaf2;
    --text-2: #aab2c2;
    --text-dim: #6b7486;
    --text-faint: #454c5c;

    /* Brand — teal for "safe/active", phosphor-green for success */
    --accent: #4de0c9;
    --accent-soft: rgba(77,224,201,0.12);
    --accent-line: rgba(77,224,201,0.35);
    --accent-ink:  #052420;              /* dark contrast ink on --accent fills (buttons, toggle knobs) */
    --accent-ink-soft: rgba(5,36,32,0.3);/* soft variant for spinner borders, etc. */
    --ink-dim:    #8a92a3;               /* muted knob color on Toggle "off" state */

    --green: #3ecf8e;
    --green-soft: rgba(62,207,142,0.10);
    --green-line: rgba(62,207,142,0.32);

    --amber: #e5a63c;
    --amber-soft: rgba(229,166,60,0.10);
    --amber-line: rgba(229,166,60,0.32);

    --red: #ef5a5a;
    --red-soft: rgba(239,90,90,0.10);
    --red-line: rgba(239,90,90,0.35);

    --blue: #6ea8ff;
    --blue-soft: rgba(110,168,255,0.12);
    --blue-line: rgba(110,168,255,0.35);

    --violet: #b892ff;
    --violet-soft: rgba(184,146,255,0.12);

    /* Per-stage colors. Named so JSX refers to "the sanitizer color" rather
       than inlining a hex. Stages 5 + 7 consume these; visual differentiation
       only — no semantic meaning beyond "each stage has a distinct hue". */
    --stage-sanitizer: var(--accent);
    --stage-boundary:  var(--blue);
    --stage-detection: var(--violet);
    --stage-analyze:   var(--violet);
    --stage-bridge:    var(--amber);
    --stage-canary:    var(--amber);
    --stage-execute:   var(--green);

    --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --font-display: 'Inter', -apple-system, system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body { font-size: 14px; line-height: 1.5; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

  /* App shell */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  /* ---- utility / shared ---- */
  .mono { font-family: var(--font-mono); }
  .dim { color: var(--text-dim); }
  .text-2 { color: var(--text-2); }
  .tabular { font-variant-numeric: tabular-nums; }
  .label {
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600;
  }
  .hr { height: 1px; background: var(--border); border: 0; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .card-tight { padding: 14px 16px; }
  .card-pad { padding: 20px; }

  /* ---- brand pulse (on activity) ---- */
  @keyframes tick {
    0% { box-shadow: 0 0 0 0 var(--accent-line); }
    60% { box-shadow: 0 0 0 8px rgba(77,224,201,0); }
    100% { box-shadow: 0 0 0 0 rgba(77,224,201,0); }
  }
  .tick { animation: tick 0.9s ease-out; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .pulse-dot { animation: pulse-dot 2.4s ease-in-out infinite; }

  /* Remove built-in focus ring for buttons we style ourselves */
  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Generic input */
  .input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    transition: border-color 0.15s;
  }
  .input:focus { outline: none; border-color: var(--accent-line); }

  /* Tooltip-ish */
  [data-hint] { position: relative; }
  [data-hint]:hover::after {
    content: attr(data-hint);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--surface-3); color: var(--text); font-size: 11px; padding: 4px 8px;
    border-radius: 6px; white-space: nowrap; z-index: 10;
    border: 1px solid var(--border-2); pointer-events: none;
  }

  .spark { overflow: visible; }

  /* generic button — ghost by default, subtle hover. Primary is the CTA. */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-2);
    font-size: 12.5px; font-weight: 500;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .btn:hover { color: var(--text); background: var(--surface-2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn:disabled:hover { background: transparent; color: var(--text-2); }

  .btn-primary {
    background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600;
  }
  .btn-primary:hover { background: color-mix(in srgb, var(--accent) 88%, white); color: var(--accent-ink); border-color: color-mix(in srgb, var(--accent) 88%, white); }

  .btn-danger { color: var(--red); }
  .btn-danger:hover { background: var(--red-soft); color: var(--red); }

  .btn-ghost { /* alias kept for back-compat — same as .btn now */ }
  .btn-ghost:hover { background: var(--surface-2); }

  /* Shared @keyframes — Test page spinner + elsewhere */
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Checkbox-style pill */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 11px; color: var(--text-2); font-weight: 500;
  }
  .pill.ok { background: var(--green-soft); border-color: var(--green-line); color: var(--green); }
  .pill.warn { background: var(--amber-soft); border-color: var(--amber-line); color: var(--amber); }
  .pill.bad { background: var(--red-soft); border-color: var(--red-line); color: var(--red); }
  .pill.accent { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent); }
  .pill.blue { background: var(--blue-soft); border-color: var(--blue-line); color: var(--blue); }

  .empty-slate {
    padding: 32px; text-align: center; color: var(--text-dim); font-size: 13px;
  }

  #root { display: contents; }

  /* Auth overlay — STATES.md §7 */
  #auth-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    align-items: center; justify-content: center;
  }
  #auth-overlay.visible { display: flex; }
  #auth-overlay .card {
    padding: 28px 32px;
    max-width: 360px;
    width: calc(100% - 40px);
  }
  #auth-overlay h1 {
    font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  #auth-overlay .subtitle {
    color: var(--text-dim); font-size: 13px; margin-bottom: 20px;
  }
  #auth-overlay input {
    margin-bottom: 12px;
  }
  #auth-overlay button {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--accent);
    color: #052420;
    font-size: 14px; font-weight: 600;
    border: 1px solid var(--accent);
    transition: background 0.15s;
  }
  #auth-overlay button:hover { background: #62ead4; }
  #auth-overlay .error {
    margin-top: 12px;
    font-size: 12px;
    color: var(--red);
    display: none;
  }
  #auth-overlay .error.visible { display: block; }

  /* Docker ephemeral warning — STATES.md §8. Rendered at top of main when applicable. */
  #docker-ephemeral-warning {
    display: none;
    background: var(--amber-soft);
    border: 1px solid var(--amber-line);
    color: var(--amber);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 16px 28px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  #docker-ephemeral-warning.visible { display: block; }
  #docker-ephemeral-warning code { font-family: var(--font-mono); font-size: 12px; }

  /* Reduced motion — STATES.md §9 / G-UI-A11Y-001 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Auth login overlay (shown when /healthz returns auth_required:true and no valid token) -->
<div id="auth-overlay">
  <div class="card">
    <h1>
      <svg width="22" height="22" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M10 1.5L17 4v6c0 4.5-3.2 7.8-7 8.5C6.2 17.8 3 14.5 3 10V4l7-2.5z"
              fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M10 5.5L13.5 7v3c0 2.2-1.5 3.8-3.5 4.2-2-.4-3.5-2-3.5-4.2V7L10 5.5z"
              fill="var(--accent)" opacity="0.3"/>
      </svg>
      Bulwark
    </h1>
    <div class="subtitle">Dashboard authentication required</div>
    <input id="auth-token-input" class="input" type="password" placeholder="Enter API token" autocomplete="off"/>
    <button id="auth-login-btn" type="button">Sign in</button>
    <div id="auth-error" class="error"></div>
  </div>
</div>

<!-- Docker ephemeral notice (shown by checkDockerWarning() when docker=true and env_configured=false) -->
<div id="docker-ephemeral-warning" role="note">
  Running in Docker. UI config changes are session-only and reset on container restart.
  Set <code>BULWARK_*</code> environment variables in your <code>docker-compose.yml</code> or <code>.env</code> file for persistent config.
</div>

<!-- React mount point -->
<div id="root"></div>

<!-- Auth + fetch-wrapper bootstrap. Runs BEFORE React loads so the token gate
     can intercept every request the JSX layer makes. -->
<script>
(function () {
  const STORAGE_KEY = 'bulwark_token';
  window.__bulwarkToken = localStorage.getItem(STORAGE_KEY) || '';

  // Attach Authorization header to every fetch when a token is set.
  const originalFetch = window.fetch;
  window.__bulwarkOriginalFetch = originalFetch;
  window.fetch = function (url, options) {
    if (window.__bulwarkToken && typeof url === 'string' && url.startsWith('/')) {
      options = options || {};
      options.headers = options.headers || {};
      if (!options.headers.Authorization && !options.headers.authorization) {
        options.headers.Authorization = 'Bearer ' + window.__bulwarkToken;
      }
    }
    return originalFetch.call(this, url, options);
  };

  const overlay = document.getElementById('auth-overlay');
  const input   = document.getElementById('auth-token-input');
  const button  = document.getElementById('auth-login-btn');
  const error   = document.getElementById('auth-error');

  function showError(msg) { error.textContent = msg; error.classList.add('visible'); }
  function clearError()   { error.textContent = '';  error.classList.remove('visible'); }

  async function submitLogin() {
    const value = input.value.trim();
    if (!value) return;
    clearError();
    try {
      const res = await originalFetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: value }),
      });
      if (res.ok) {
        window.__bulwarkToken = value;
        localStorage.setItem(STORAGE_KEY, value);
        overlay.classList.remove('visible');
      } else {
        showError('Invalid token');
      }
    } catch (e) {
      showError('Connection failed');
    }
  }
  button.addEventListener('click', submitLogin);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitLogin(); });

  async function bootstrap() {
    try {
      const res = await originalFetch('/healthz');
      const data = await res.json();
      if (data.docker && !data.env_configured) {
        document.getElementById('docker-ephemeral-warning').classList.add('visible');
      }
      if (!data.auth_required) return;
      if (window.__bulwarkToken) {
        const test = await originalFetch('/api/config');
        if (test.ok) return;
        localStorage.removeItem(STORAGE_KEY);
        window.__bulwarkToken = '';
      }
      overlay.classList.add('visible');
      input.focus();
    } catch (_) { /* best-effort */ }
  }
  bootstrap();
})();
</script>

<!-- React + Babel (pinned SRI — per ADR-020). Production builds since v2.5.12
     close out the deferred follow-up in ADR-020: ~600 KB smaller bundle and
     ~30% faster transpile/runtime than the development UMDs. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- JSX components. Declared statically so Babel Standalone transforms them on load. -->
<script type="text/babel" src="/static/src/data.jsx"></script>
<script type="text/babel" src="/static/src/primitives.jsx"></script>
<script type="text/babel" src="/static/src/shell.jsx"></script>
<script type="text/babel" src="/static/src/page-shield.jsx"></script>
<script type="text/babel" src="/static/src/page-events.jsx"></script>
<script type="text/babel" src="/static/src/page-configure.jsx"></script>
<script type="text/babel" src="/static/src/page-leak-detection.jsx"></script>
<script type="text/babel" src="/static/src/page-test.jsx"></script>
<script type="text/babel" src="/static/src/app.jsx"></script>

</body>
</html>
